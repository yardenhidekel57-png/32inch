<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --accent-gold: #f59e0b;
            --bg-gradient: radial-gradient(circle at center, #0f172a 0%, #1e3a8a 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background: var(--bg-gradient);
            font-family: 'Assistant', sans-serif; height: 100vh; width: 100vw; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* Header */
        .header-wrapper { height: 10vh; display: flex; align-items: center; padding: 0 2vw; }
        .header-bubble {
            width: 100%; height: 8vh; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border: 2px solid var(--accent-gold); border-radius: 15px;
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 0 2vw;
        }
        .header-center { display: flex; justify-content: center; gap: 20px; color: white; font-size: 2.5vw; font-weight: 800; }

        /* Main Stage - 70/30 Layout */
        .stage { 
            height: 80vh; 
            display: flex; 
            gap: 1.5vw; 
            padding: 0 2vw 1vh 2vw; /* הוספת ריווח למניעת חיתוך */
        }
        .center-col { flex: 7; display: flex; flex-direction: column; }
        .side-col-right { flex: 3; display: flex; flex-direction: column; gap: 1.5vh; }

        .card { background: var(--card-bg); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .card-header { background: var(--primary-blue); color: var(--accent-gold); height: 6vh; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.8vw; border-bottom: 3px solid var(--accent-gold); }

        /* Messages */
        #message-box { flex:1; padding:15px; overflow-y:auto; }
        .msg-bubble { background: #f1f5f9; padding: 20px; border-radius: 15px; border-right: 8px solid var(--accent-gold); margin-bottom: 12px; font-size: 2vw; font-weight: 700; color: var(--primary-blue); }

        /* Events */
        #events-list { flex: 1; padding: 10px; }
        .event-item { background: white; padding: 10px; border-radius: 10px; border-right: 6px solid var(--primary-blue); margin-bottom: 8px; font-size: 1.3vw; font-weight: 800; display: flex; align-items: center; }
        .event-date { color: var(--primary-blue); margin-left: 10px; font-size: 1.1vw; }

        /* Promo & QR */
        .promo-content { padding: 8px; text-align: center; }
        .cake-img { width: 100%; height: 12vh; object-fit: cover; border-radius: 10px; }
        .qr-section { background: #f0f9ff; padding: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; border-top: 1px solid #bae6fd; }
        .qr-img { height: 8vh; width: 8vh; border: 1px solid var(--primary-blue); border-radius: 5px; }

        /* News Ticker */
        .ticker-wrap { height: 5vh; background: white; width: 100%; display: flex; align-items: center; position: relative; border-top: 3px solid #ee2d24; }
        .ticker-content { display: inline-block; white-space: nowrap; animation: ticker 150s linear infinite; font-size: 1.6vw; font-weight: 800; color: #ee2d24; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }
        .ynet-label { background: #ee2d24; color: white; padding: 0 15px; height: 100%; display: flex; align-items: center; font-weight: 900; z-index: 5; position: absolute; right: 0; }
    </style>
</head>
<body>

<div class="header-wrapper">
    <div class="header-bubble">
        <div style="color:var(--accent-gold); font-weight:800; font-size:1.4vw;">📍 דודו דותן 2, נתניה</div>
        <div class="header-center">
            <div id="live-date">--/--</div>
            <div id="live-clock">--:--</div>
        </div>
        <div style="text-align:left; color:white; font-size:1vw;">Gal & Yarden Board ©</div>
    </div>
</div>

<div class="stage">
    <div class="center-col">
        <div class="card" style="height: 100%;">
            <div class="card-header">📢 הודעות ועד הבית</div>
            <div id="message-box">טוען הודעות...</div>
            <div style="background:#ef4444; color:white; text-align:center; padding:5px; font-weight:900; font-size:1.5vw;">🚨 חירום: 053-2784358</div>
        </div>
    </div>

    <div class="side-col-right">
        <div class="card" style="flex: 1.2;">
            <div class="card-header">🗓️ אירועים קרובים</div>
            <div id="events-list">טוען יומן...</div>
            <div class="qr-section">
                <span style="font-size:0.9vw; font-weight:800;">שריון ג'ימבורי:</span>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://forms.gle/FiVeEZ6pes8JKA7d6" class="qr-img">
            </div>
        </div>

        <div class="card" style="flex: 1;">
            <div class="card-header">🍰 פרסום</div>
            <div class="promo-content">
                <img src="https://i.postimg.cc/8PKxcRFT/PHOTO-2026-02-24-10-45-14.jpg" class="cake-img">
                <div style="font-weight:800; color:var(--primary-blue); margin-top:5px;">רון: 052-2221491</div>
            </div>
            <div class="qr-section" style="background:#fffdf5;">
                <span style="font-size:0.9vw; font-weight:800;">לפרסום:</span>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://wa.me/972502655525" class="qr-img">
            </div>
        </div>
    </div>
</div>

<div class="ticker-wrap">
    <div class="ynet-label">ynet</div>
    <div class="ticker-content" id="news-ticker">טוען מבזקים...</div>
</div>

<script>
    // החלף את הכתובת הזו בכתובת שקיבלת מה-Deployment
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyu3cJo5iSfnKWjEz-lQ8WFC-z7Y3GoLi17BKV0nIaLrF6EktyAAwV-HS2H_XoYWrmG/exec';

    function updateTime() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('live-date').innerText = now.toLocaleDateString('he-IL', {day:'2-digit', month:'2-digit'});
    }

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const data = await res.json();
            
            if (data.messages) {
                document.getElementById('message-box').innerHTML = data.messages.slice(1).reverse().map(m => 
                    `<div class="msg-bubble">${m.replace(/#/g,'<br>')}</div>`
                ).join('');
            }
            
            if (data.events && data.events.length > 0) {
                document.getElementById('events-list').innerHTML = data.events.map(e => {
                    const parts = e.split('|');
                    return `<div class="event-item"><span class="event-date">${parts[0]}</span><span>${parts[1]}</span></div>`;
                }).join('');
            } else {
                document.getElementById('events-list').innerHTML = '<div style="text-align:center; padding:20px; color:gray;">אין אירועים השבוע</div>';
            }
        } catch(e) { console.log(e); }
    }

    async function fetchNews() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.ynet.co.il%2FIntegration%2FStoryRss2.xml`);
            const data = await res.json();
            const news = data.items.map(i => i.title).join("  •  ");
            document.getElementById('news-ticker').innerText = " • " + news + " • " + news;
        } catch(e) {}
    }

    setInterval(updateTime, 1000);
    setInterval(fetchData, 30000);
    setInterval(fetchNews, 60000);
    updateTime(); fetchData(); fetchNews();
</script>
</body>
</html>
