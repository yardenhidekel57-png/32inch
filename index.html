<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Gal & Yarden Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@600;800&display=swap" rel="stylesheet">
    <style>
        /* הגדרות בסיס - ללא שינוי */
        body { 
            margin: 0; padding: 0; background: #1e3a8a; 
            font-family: 'Assistant', sans-serif; overflow: hidden; color: #1e293b;
        }
        
        /* Header */
        .header {
            height: 10vh; background: rgba(0,0,0,0.3); border-bottom: 2px solid #f59e0b;
            color: white; display: block; text-align: center; line-height: 10vh; flex-shrink: 0;
        }
        .header div { display: inline-block; margin: 0 20px; font-size: 2.5vw; font-weight: 800; }

        /* Container Layout */
        .main-container { height: 85vh; width: 100%; padding: 10px; box-sizing: border-box; }
        
        /* Columns - נשמר יחס 70/30 */
        .col-messages { 
            width: 68%; float: right; height: 100%; 
            background: white; border-radius: 20px; margin-left: 2%; 
            position: relative; overflow: hidden;
        }
        .col-side { width: 30%; float: right; height: 100%; }

        .card { 
            background: #f8fafc; border-radius: 15px; margin-bottom: 15px; 
            border: 2px solid #e2e8f0; overflow: hidden; 
        }
        
        /* כותרות כרטיסיות */
        .card-title { 
            background: #1e3a8a; color: #f59e0b; padding: 10px; 
            text-align: center; font-weight: 800; font-size: 1.8vw; flex-shrink: 0;
        }

        #message-box { padding: 20px; font-size: 2vw; height: 60vh; overflow-y: auto; }
        .msg { background: white; border-right: 8px solid #f59e0b; padding: 15px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .event-item { background: white; padding: 8px; margin: 5px; border-right: 5px solid #1e3a8a; font-size: 1.2vw; font-weight: bold; }

        /* --- עדכון אזור הפרסום --- */
        .promo-card-content {
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; padding: 10px; height: 100%;
        }
        
        /* התמונה - מוגדרת כגדולה ככל הניתן (70% מגובה הכרטיסייה) */
        .promo-img {
            width: 100%; height: 70%; object-fit: cover; 
            border-radius: 10px; flex-grow: 1;
        }
        
        /* הטקסט - מרוכז למטה */
        .promo-text-container {
            text-align: center; padding-top: 5px; height: 30%; 
            display: flex; flex-direction: column; justify-content: center;
        }
        
        .promo-cake-text { font-size: 1.3vw; font-weight: 800; color: #1e3a8a; }
        .promo-phone { background: #f59e0b; color: #000; padding: 2px 10px; border-radius: 5px; font-size: 1.2vw; font-weight: bold; margin-top: 2px; }

        /* Ticker - ללא שינוי */
        .ticker-bar {
            position: fixed; bottom: 0; width: 100%; height: 5vh; 
            background: white; border-top: 3px solid #ef4444; overflow: hidden;
        }
        .ticker-text {
            white-space: nowrap; position: absolute; width: 100%;
            animation: move 120s linear infinite; font-size: 1.8vw; color: #ef4444; font-weight: 800;
        }
        @keyframes move { 0% { right: -100%; } 100% { right: 100%; } }
    </style>
</head>
<body>

<div class="header">
    <div>📍 דודו דותן 2, נתניה</div>
    <div id="live-time">--:--</div>
    <div style="font-size: 1vw;">Gal & Yarden Board ©</div>
</div>

<div class="main-container">
    <div class="col-messages">
        <div class="card-title">📢 הודעות ועד הבית</div>
        <div id="message-box">טוען הודעות...</div>
        <div style="position:absolute; bottom:0; width:100%; background:#ef4444; color:white; text-align:center; padding:10px; font-weight:900; font-size:1.5vw;">
            🚨 חירום חב' ניהול: 053-2784358
        </div>
    </div>

    <div class="col-side">
        <div class="card" style="height: 45%;">
            <div class="card-title" style="font-size: 1.4vw;">🗓️ אירועים</div>
            <div id="events-list">טוען יומן...</div>
        </div>
        
        <div class="card" style="height: 50%;">
            <div class="card-title" style="font-size: 1.4vw;">🍰 אזור פרסום</div>
            <div class="promo-card-content">
                <img src="https://i.postimg.cc/8PKxcRFT/PHOTO-2026-02-24-10-45-14.jpg" class="promo-img" alt="עוגות רון">
                <div class="promo-text-container">
                    <div class="promo-cake-text">עוגות שמרים מעולם אחר!</div>
                    <div class="promo-phone">רון: 052-2221491</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="ticker-bar">
    <div class="ticker-text" id="news-ticker">מתחבר למבזקי ynet...</div>
</div>

<script>
    // ה-Script ללא שינוי, הוא כבר תומך באירועים והודעות
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyu3cJo5iSfnKWjEz-lQ8WFC-z7Y3GoLi17BKV0nIaLrF6EktyAAwV-HS2H_XoYWrmG/exec';

    function updateClock() {
        const now = new Date();
        document.getElementById('live-time').innerText = now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
    }

    async function getData() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const data = await res.json();
            
            if (data.messages && data.messages.length > 0) {
                document.getElementById('message-box').innerHTML = data.messages.slice(1).reverse().map(m => 
                    `<div class="msg">${m.replace(/#/g,'<br>')}</div>`
                ).join('');
            } else {
                document.getElementById('message-box').innerHTML = '<div style="text-align:center; padding:20px; color:gray;">אין הודעות חדשות</div>';
            }
            
            if (data.events && data.events.length > 0) {
                document.getElementById('events-list').innerHTML = data.events.map(e => {
                    const p = e.split('|');
                    return `<div class="event-item"><b>${p[0] || ''}</b> | ${p[1] || ''}</div>`;
                }).join('');
            } else {
                document.getElementById('events-list').innerHTML = '<div style="text-align:center; padding:20px; color:gray;">אין אירועים קרובים</div>';
            }
        } catch(e) { console.error("שגיאה בטעינת נתונים:", e); }
    }

    async function getNews() {
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.ynet.co.il%2FIntegration%2FStoryRss2.xml');
            const data = await res.json();
            if (data.items) {
                document.getElementById('news-ticker').innerText = data.items.map(i => i.title).join("  •  ");
            }
        } catch(e) {}
    }

    // הפעלה ועדכונים
    setInterval(updateClock, 1000);
    setInterval(getData, 30000); // עדכון הודעות ויומן כל 30 שניות
    setInterval(getNews, 60000); // עדכון חדשות כל דקה
    updateClock(); getData(); getNews();
</script>

</body>
</html>
