<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 15px; font-family: sans-serif; background-color: #f0f4f8; }
        .header { text-align: center; background: #0052D4; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 28px; }

        /* סידור עמודות שמשתנה לפי גודל מסך */
        .main-container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* בטלוויזיה: 2 עמודות */
            gap: 20px; 
        }

        @media (max-width: 600px) {
            .main-container { grid-template-columns: 1fr; } /* בטלפון: עמודה אחת */
        }

        .section { background: white; padding: 15px; border-radius: 15px; border: 1px solid #ddd; display: flex; flex-direction: column; }
        .section-title { font-size: 24px; font-weight: bold; color: #0052D4; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        
        .message-card { background: #fff; border-right: 5px solid #ffcc00; padding: 15px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .message-text { font-size: 20px; line-height: 1.4; }

        .qr-area { text-align: center; margin-top: auto; padding: 10px; background: #f9f9f9; border-radius: 10px; }
        .qr-area img { width: 140px; height: 140px; background: #ccc; } /* כאן יופיע ה-QR שלך */
    </style>
</head>
<body>

    <div class="header">
        <h1>לוח הודעות - בניין 57</h1>
    </div>

    <div class="main-container">
        <div class="section">
            <div class="section-title">📢 הודעות ועד הבית</div>
            <div class="message-card">
                <div class="message-text">גאים להשיק את לוח המודעות החדש!</div>
            </div>
            <div class="message-card">
                <div class="message-text">מייל הועד לפניות: dududotann2@gmail.com</div>
            </div>
            <div class="qr-area">
                <div style="padding: 20px; border: 1px dashed #666;">[כאן שים קישור ל-QR שלך]</div>
                <div style="margin-top:5px;">סרקו לפתיחת פנייה</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🏢 עסקים ופרסום</div>
            <div class="message-card" style="border-right-color: #28a745;">
                <div class="message-text">כאן יפורסמו עסקים של דיירים ובעלי מקצוע מומלצים.</div>
            </div>
            <div class="qr-area">
                <div style="padding: 20px; border: 1px dashed #666;">[כאן שים קישור ל-QR לפרסום]</div>
                <div style="margin-top:5px;">לפרסום כאן סרקו</div>
            </div>
        </div>
    </div>

</body>
</html>
