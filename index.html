<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0f172a; 
            --accent-gold: #d4af37; 
            --card-bg: #ffffff;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background-color: var(--primary-blue); 
            font-family: 'Assistant', sans-serif; height: 100vh; overflow: hidden;
        }
        
        /* Header - מוגן מחיתוך */
        .header {
            height: 10vh; display: flex; justify-content: space-between; align-items: center;
            padding: 0 4vw; border-bottom: 3px solid var(--accent-gold); color: white;
        }
        .header-text { font-size: 2.2vw; font-weight: 800; }

        /* Main Layout - שימוש ב-Floats במקום Flex למניעת בעיות בטלוויזיה */
        .main-container { height: 84vh; width: 100%; padding: 2vh 3vw; }
        
        .col-messages { 
            width: 65%; float: right; height: 100%; 
            background: white; border-radius: 20px; position: relative; overflow: hidden;
            border: 2px solid #cbd5e1;
        }
        
        .col-side { width: 32%; float: left; height: 100%; }

        .card { 
            background: white; border-radius: 20px; margin-bottom: 2vh; 
            border: 2px solid #cbd5e1; overflow: hidden; position: relative;
        }
        .card-title { 
            background: var(--primary-blue); color: var(--accent-gold); padding: 10px; 
            text-align: center; font-weight: 800; font-size: 1.6vw; border-bottom: 2px solid var(--accent-gold);
        }

        /* Messages */
        #message-box { padding: 15px; font-size: 2vw; height: 65vh; overflow-y: auto; color: #1e293b; }
        .msg { background: #f8fafc; border-right: 10px solid var(--accent-gold); padding: 15px; margin-bottom: 12px; border-radius: 8px; font-weight: 700; }

        /* Events - רק תאריך */
        .event { padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 1.4vw; font-weight: 800; color: #0f172a; }

        /* Promo Area */
        .promo-img { width: 100%; height: 20vh; object-fit: cover; }
        .promo-text { text-align: center; padding: 5px; font-size: 1.3vw; font-weight: 800; color: #0f172a; }
        .promo-phone { background: var(--accent-gold); color: black; padding: 3px 10px; border-radius: 5px; display: inline-block; font-size: 1.4vw; margin-top: 2px; }

        /* QR Section */
        .qr-area { display: flex; align-items: center; justify-content: center; background: #f1f5f9; padding: 5px; gap: 10px; }
        .qr-img { height: 7vh; width: 7vh; background: white; padding: 3px; border: 1px solid #94a3b8; }
        .qr-label { font-size: 1vw; font-weight: 800; line-height: 1.1; }

        /* Ticker */
        .footer { position: fixed; bottom: 0; width: 100%; height: 6vh; background: white; border-top: 4px solid #ef4444; overflow: hidden; }
        #ticker { white-space: nowrap; position: absolute; right: 0; line-height: 6vh; font-size: 1.8vw; color: #ef4444; font-weight: 800; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-text">📍 דודו דותן 2, נתניה</div>
    <div class="header-text" id="clock">00:00</div>
</div>

<div class="main-container">
    <div class="col-messages">
        <div class="card-title">📢 הודעות ועד הבית</div>
        <div id="message-box">טוען הודעות...</div>
        <div style="background:#ef4444; color:white; text-align:center; padding:8px; font-weight:bold; font-size:1.5vw; position:absolute; bottom:0; width:100%;">
            🚨 חירום חב' ניהול: 053-2784358
        </div>
    </div>

    <div class="col-side">
        <div class="card" style="height: 40%;">
            <div class="card-title">🗓️ אירועים</div>
            <div id="events-list" style="overflow-y: auto; height: 18vh;">טוען...</div>
            <div class="qr-area">
                <div class="qr-label">לשריון<br>ג'ימבורי:</div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://forms.gle/FiVeEZ6pes8JKA7d6" class="qr-img">
            </div>
        </div>
        
        <div class="card" style="height: 55%;">
            <div class="card-title">🍰 אזור פרסום</div>
            <img src="https://i.postimg.cc/8PKxcRFT/PHOTO-2026-02-24-10-45-14.jpg" class="promo-img">
            <div class="promo-text">
                עוגות שמרים מעולם אחר!<br>
                <span class="promo-phone">רון: 052-2221491</span>
            </div>
            <div class="qr-area">
                <div class="qr-label">מעוניינים<br>בפרסום?</div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://wa.me/972502655525" class="qr-img">
            </div>
        </div>
    </div>
</div>

<div class="footer">
    <div id="ticker">טוען מבזקים...</div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyu3cJo5iSfnKWjEz-lQ8WFC-z7Y3GoLi17BKV0nIaLrF6EktyAAwV-HS2H_XoYWrmG/exec';

    function tick() {
        const now = new Date();
        document.getElementById('clock').innerHTML = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }

    async function loadData() {
        try {
            const r = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const d = await r.json();
            
            if(d.messages) {
                document.getElementById('message-box').innerHTML = d.messages.slice(1).reverse().map(m => 
                    `<div class="msg">${m.replace(/#/g,'<br>')}</div>`
                ).join('');
            }
            
            if(d.events) {
                document.getElementById('events-list').innerHTML = d.events.map(e => {
                    const p = e.split('|');
                    // מציג רק תאריך (לוקח את מה שלפני הרווח הראשון)
                    let dateOnly = p[0] ? p[0].trim().split(' ')[0] : "";
                    return `<div class="event"><b>${dateOnly}</b> | ${p[1] || ''}</div>`;
                }).join('');
            }
        } catch(e) { console.error(e); }
    }

    async function getNews() {
        try {
            const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.ynet.co.il%2FIntegration%2FStoryRss2.xml');
            const d = await r.json();
            document.getElementById('ticker').innerHTML = "  •  " + d.items.map(i => i.title).join("  •  ");
        } catch(e) {}
    }

    let pos = -500;
    function move() {
        pos += 1.5;
        if (pos > window.innerWidth) pos = -1500;
        document.getElementById('ticker').style.right = pos + "px";
        requestAnimationFrame(move);
    }

    setInterval(tick, 1000);
    setInterval(loadData, 30000);
    setInterval(getNews, 60000);
    tick(); loadData(); getNews(); move();
</script>
</body>
</html>
