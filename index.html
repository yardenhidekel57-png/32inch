<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Gal & Yarden Board</title>
    <style>
        /* עיצוב בסיסי וקשיח למניעת תקלות תצוגה בטלוויזיה */
        body { 
            margin: 0; padding: 0; background-color: #1e3a8a; 
            font-family: Arial, sans-serif; overflow: hidden; color: #1e293b;
        }
        
        /* כותרת עליונה */
        .header {
            height: 10vh; background: rgba(0,0,0,0.4); border-bottom: 3px solid #f59e0b;
            color: white; text-align: center; line-height: 10vh;
        }
        .header-item { display: inline-block; margin: 0 25px; font-size: 2.5vw; font-weight: bold; }

        /* חלוקת המסך - שימוש באחוזים מדויקים */
        .container { width: 100%; height: 85vh; padding: 15px; box-sizing: border-box; }
        
        /* עמודת הודעות - 70% */
        .right-col { 
            width: 68%; float: right; height: 95%; 
            background: white; border-radius: 25px; position: relative;
        }
        
        /* עמודת צד - 30% */
        .left-col { width: 30%; float: left; height: 95%; }

        .card { 
            background: #f8fafc; border-radius: 20px; margin-bottom: 15px; 
            border: 2px solid #cbd5e1; overflow: hidden; 
        }
        .title { 
            background: #1e3a8a; color: #f59e0b; padding: 12px; 
            text-align: center; font-weight: bold; font-size: 1.8vw; 
        }

        #message-box { padding: 20px; font-size: 2.2vw; height: 65vh; overflow-y: auto; }
        .msg { background: #fff; border-right: 10px solid #f59e0b; padding: 15px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .event { background: white; padding: 10px; margin: 8px; border-right: 6px solid #1e3a8a; font-size: 1.3vw; font-weight: bold; }

        /* אזור פרסום משופר */
        .promo-box { height: 100%; text-align: center; display: block; }
        .promo-img { width: 95%; height: 22vh; object-fit: cover; border-radius: 12px; margin-top: 10px; }
        .promo-text { font-size: 1.4vw; font-weight: bold; color: #1e3a8a; margin-top: 10px; }
        .promo-phone { background: #f59e0b; color: black; padding: 5px 15px; border-radius: 8px; display: inline-block; font-size: 1.5vw; margin-top: 5px; }

        /* חדשות - אנימציה פשוטה */
        .footer {
            position: fixed; bottom: 0; width: 100%; height: 5vh; 
            background: white; border-top: 4px solid #ef4444; overflow: hidden;
        }
        #ticker {
            white-space: nowrap; position: absolute; right: 0;
            line-height: 5vh; font-size: 1.8vw; color: #ef4444; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-item">📍 דודו דותן 2, נתניה</div>
    <div class="header-item" id="clock">00:00</div>
    <div class="header-item" style="font-size: 1.2vw; opacity: 0.8;">Gal & Yarden Board ©</div>
</div>

<div class="container">
    <div class="right-col">
        <div class="title">📢 הודעות ועד הבית</div>
        <div id="message-box">טוען הודעות...</div>
        <div style="position:absolute; bottom:0; width:100%; background:#ef4444; color:white; text-align:center; padding:10px; font-weight:bold; font-size:1.6vw; border-radius: 0 0 25px 25px;">
            🚨 חירום חב' ניהול: 053-2784358
        </div>
    </div>

    <div class="left-col">
        <div class="card" style="height: 42%;">
            <div class="title">🗓️ אירועים</div>
            <div id="events-list">טוען...</div>
        </div>
        
        <div class="card" style="height: 54%;">
            <div class="title">🍰 אזור פרסום</div>
            <div class="promo-box">
                <img src="https://i.postimg.cc/8PKxcRFT/PHOTO-2026-02-24-10-45-14.jpg" class="promo-img">
                <div class="promo-text">עוגות שמרים מעולם אחר!</div>
                <div class="promo-phone">רון: 052-2221491</div>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    <div id="ticker">טוען מבזקים...</div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyu3cJo5iSfnKWjEz-lQ8WFC-z7Y3GoLi17BKV0nIaLrF6EktyAAwV-HS2H_XoYWrmG/exec';

    function tick() {
        const now = new Date();
        document.getElementById('clock').innerHTML = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }

    async function load() {
        try {
            const r = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const d = await r.json();
            
            if(d.messages) {
                document.getElementById('message-box').innerHTML = d.messages.slice(1).reverse().map(m => 
                    `<div class="msg">${m.replace(/#/g,'<br>')}</div>`
                ).join('');
            }
            
            if(d.events) {
                document.getElementById('events-list').innerHTML = d.events.map(e => {
                    const p = e.split('|');
                    return `<div class="event"><b>${p[0] || ''}</b> | ${p[1] || ''}</div>`;
                }).join('');
            }
        } catch(e) {}
    }

    async function news() {
        try {
            const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.ynet.co.il%2FIntegration%2FStoryRss2.xml');
            const d = await r.json();
            document.getElementById('ticker').innerHTML = d.items.map(i => i.title).join("  •  ");
        } catch(e) {}
    }

    // אנימציית הטיקר ידנית כדי שלא תתקע
    let pos = -500;
    function moveTicker() {
        pos += 2;
        if (pos > window.innerWidth) pos = -1500;
        document.getElementById('ticker').style.right = pos + "px";
        requestAnimationFrame(moveTicker);
    }

    setInterval(tick, 1000);
    setInterval(load, 30000);
    setInterval(news, 60000);
    tick(); load(); news(); moveTicker();
</script>

</body>
</html>
