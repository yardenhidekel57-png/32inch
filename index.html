<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ערכת צבעים מקצועית: כחול עמוק וזהב אטרקטיבי */
            --primary-blue: #0f172a; /* אפור פחם כהה-כהה, מראה יוקרתי */
            --accent-gold: #d4af37; /* צבע זהב מט */
            --card-bg: rgba(255, 255, 255, 0.98);
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background-color: var(--primary-blue); 
            font-family: 'Assistant', sans-serif; height: 100vh; width: 100vw; 
            display: flex; flex-direction: column; overflow: hidden; color: #1e293b;
        }
        
        /* Header Fix - גובה ורווחים מוגדלים */
        .header-wrapper { height: 11vh; display: flex; justify-content: center; align-items: center; padding: 0 2.5vw; flex-shrink: 0; }
        .header-bubble {
            width: 100%; height: 9vh; background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent-gold); border-radius: 20px;
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 0 2vw;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .header-right { text-align: right; font-size: 1.8vw; font-weight: 800; color: var(--accent-gold); }
        .header-center { text-align: center; display: flex; align-items: center; justify-content: center; gap: 20px; color: white; font-size: 2.5vw; font-weight: 800; }
        .header-left { text-align: left; font-size: 1vw; color: white; font-weight: 600; opacity: 0.8; }

        /* Container Fix למניעת חיתוך */
        .main-container { height: 83vh; width: 100%; padding: 0 2.5vw 2vh 2.5vw; box-sizing: border-box; }
        
        /* Column Messages - 70% הרוחב של ה'קונטיינר', לא של המסך */
        .col-messages { 
            width: 68%; float: right; height: 98%; 
            background: white; border-radius: 25px; position: relative; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 2px solid #e2e8f0;
        }
        
        /* Column Side - 30% */
        .col-side { width: 30%; float: left; height: 98%; overflow: hidden; }

        .card { 
            background: var(--card-bg); border-radius: 20px; margin-bottom: 1.5vh; 
            border: 2px solid #cbd5e1; overflow: hidden; display: flex; flex-direction: column; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .card-title { 
            background: var(--primary-blue); color: var(--accent-gold); padding: 12px; 
            text-align: center; font-weight: 800; font-size: 1.8vw; border-bottom: 3px solid var(--accent-gold); flex-shrink: 0;
        }

        /* Message Styles */
        #message-box { padding: 20px; font-size: 2.2vw; flex-grow: 1; overflow-y: auto; }
        .msg { background: white; border-right: 12px solid var(--accent-gold); padding: 22px; margin-bottom: 15px; border-radius: 12px; font-weight: 700; color: #0f172a; line-height: 1.4; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* Event Styles */
        #events-list { padding: 10px; flex-grow: 1; }
        .event { background: white; padding: 12px; margin: 8px; border-right: 6px solid var(--primary-blue); border-radius: 8px; font-size: 1.5vw; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .event b { color: var(--primary-blue); white-space: nowrap; }

        /* אזור פרסום - לא חתוך */
        .promo-box { flex-grow: 1; text-align: center; padding: 10px; display: flex; flex-direction: column; justify-content: space-around; gap: 5px; }
        .promo-img { width: 100%; height: 23vh; object-fit: cover; border-radius: 15px; border: 2px solid #e2e8f0; }
        .promo-text { font-size: 1.4vw; font-weight: 800; color: #0f172a; line-height: 1.2; }
        .promo-phone { background: var(--accent-gold); color: black; padding: 5px 15px; border-radius: 10px; display: inline-block; font-size: 1.6vw; font-weight: bold; }

        /* QR Scaling - מותאם לסריקה ב-32" */
        .qr-section { background: #f8fafc; padding: 10px 15px; display: flex; align-items: center; justify-content: center; gap: 15px; border-top: 2px solid #bae6fd; flex-shrink: 0; }
        .qr-img-styled { height: 9vh; width: 9vh; border: 2px solid var(--primary-blue); border-radius: 10px; padding: 6px; background: white; }
        .qr-text-label { font-size: 1.1vw; font-weight: 800; color: var(--primary-blue); line-height: 1.2; }

        /* Ticker - עם צבעי החדשות של ynet */
        .ticker-bar {
            position: fixed; bottom: 0; width: 100%; height: 6vh; 
            background: white; border-top: 4px solid #ee2d24; overflow: hidden;
        }
        #ticker {
            white-space: nowrap; position: absolute; right: 0;
            line-height: 6vh; font-size: 2.1vw; color: #ee2d24; font-weight: 800;
        }
    </style>
</head>
<body>

<div class="header-wrapper">
    <div class="header-bubble">
        <div class="header-right">📍 דודו דותן 2, נתניה</div>
        <div class="header-center">
            <div id="live-time">00:00</div>
        </div>
        <div class="header-left">Gal & Yarden Board ©</div>
    </div>
</div>

<div class="stage-wrapper main-container">
    <div class="col-messages">
        <div class="card-title">📢 הודעות ועד הבית</div>
        <div id="message-box">טוען הודעות...</div>
        <div style="background:#ef4444; color:white; text-align:center; padding:10px; font-weight:bold; font-size:1.8vw; position:absolute; bottom:0; width:100%;">
            🚨 חירום חב' ניהול: 053-2784358
        </div>
    </div>

    <div class="col-side">
        <div class="card" style="height: 40%; flex: 1.2;">
            <div class="card-title" style="font-size: 1.5vw;">🗓️ אירועים</div>
            <div id="events-list">טוען אירועים...</div>
            <div class="qr-section">
                <div class="qr-text-label">לשריון<br>ג'ימבורי:</div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://forms.gle/FiVeEZ6pes8JKA7d6" class="qr-img-styled">
            </div>
        </div>
        
        <div class="card" style="height: 57%; flex: 1.2;">
            <div class="card-title" style="font-size: 1.5vw;">🍰 אזור פרסום</div>
            <div class="promo-box">
                <img src="https://i.postimg.cc/8PKxcRFT/PHOTO-2026-02-24-10-45-14.jpg" class="promo-img">
                <div class="promo-text">عוגות שמרים מעולם אחר!</div>
                <div class="promo-phone">רון: 052-2221491</div>
            </div>
            <div class="qr-section" style="background: #fffdf5; border-color: #fef08a;">
                <div class="qr-text-label">מעוניינים<br>בפרסום?</div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wa.me/972502655525" class="qr-img-styled">
            </div>
        </div>
    </div>
</div>

<div class="ticker-bar">
    <div id="ticker">טוען מבזקים...</div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyu3cJo5iSfnKWjEz-lQ8WFC-z7Y3GoLi17BKV0nIaLrF6EktyAAwV-HS2H_XoYWrmG/exec';

    function updateClock() {
        const now = new Date();
        document.getElementById('live-time').innerHTML = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }

    async function getData() {
        try {
            const r = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const data = await res.json();
            
            if (data.messages && data.messages.length > 0) {
                document.getElementById('message-box').innerHTML = data.messages.slice(1).reverse().map(m => 
                    `<div class="msg">${m.replace(/#/g,'<br>')}</div>`
                ).join('');
            } else {
                document.getElementById('message-box').innerHTML = '<div style="text-align:center; padding:20px; color:gray;">אין הודעות חדשות</div>';
            }
            
            if (data.events && data.events.length > 0) {
                document.getElementById('events-list').innerHTML = data.events.map(e => {
                    const parts = e.split('|');
                    // תיקון: הצגת התאריך בלבד
                    let dateStr = parts[0] ? parts[0].trim().split(' ')[0] : "";
                    let nameStr = parts[1] ? parts[1].replace(/00:00/g, '').trim() : "";
                    return `<div class="event"><b>${dateStr}</b> | ${nameStr}</div>`;
                }).join('');
            } else {
                document.getElementById('events-list').innerHTML = '<div style="text-align:center; color:gray; padding-top:20px;">אין אירועים קרובים</div>';
            }
        } catch(e) { console.error("Error loading data:", e); fetchDataOld(); }
    }

    async function fetchNews() {
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.ynet.co.il%2FIntegration%2FStoryRss2.xml');
            const data = await res.json();
            if (data.items) {
                document.getElementById('news-ticker').innerHTML = "  •  " + data.items.map(i => i.title).join("  •  ");
            }
        } catch(e) {}
    }

    // אנימציה ידנית לטיקר למניעת תקיעות בטלוויזיות Neon
    let tPos = -1000;
    function animateTicker() {
        tPos += 1.5; // מהירות התנועה
        if (tPos > window.innerWidth) tPos = -2000;
        document.getElementById('ticker').style.right = tPos + "px";
        requestAnimationFrame(animateTicker);
    }

    // הפעלה ועדכונים
    setInterval(updateClock, 1000);
    setInterval(getData, 30000); // הודעות ויומן כל 30 שניות
    setInterval(fetchNews, 60000); // חדשות כל דקה
    updateClock(); getData(); fetchNews(); animateTicker();
</script>

</body>
</html>
